<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Writing Assistant</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header id="toolbar">
    <span class="app-title">Writing Assistant</span>
    <label class="cfg-field"><span>URL</span><input id="cfg-url" type="url" spellcheck="false" placeholder="https://openrouter.ai/api/v1/chat/completions"></label>
    <label class="cfg-field"><span>Key</span><input id="cfg-key" type="password" spellcheck="false" placeholder="sk-…"></label>
    <label class="cfg-field"><span>Model</span><input id="cfg-model" type="text" spellcheck="false" placeholder="google/gemini-3-flash-preview"></label>
    <select id="cfg-saved"><option value="" disabled selected>Saved configs…</option></select>
    <button id="cfg-save">Save</button>
    <button id="add-tile">+ Add tile</button>
  </header>
  <main id="grid"></main>
  <script src="app.js"></script>
</body>
</html>
